<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kurodo-VRM</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="header">
      <span id="title">Kurodo-VRM</span>
      <div id="status-wrap">
        <div id="status-dot"></div>
        <span id="status-text">대기 중</span>
      </div>
    </header>

    <div id="viewport">
      <div id="no-avatar">
        <span>VRM 파일을 불러오세요</span>
      </div>
      <div id="vrm-viewport" class="hidden"></div>
      <div id="speech-bubble" class="hidden"></div>
    </div>

    <div id="controls">
      <div id="model-row">
        <label id="model-label">모델 파일 (.vrm)</label>
        <input type="file" id="model-input" accept=".vrm" />
        <span id="model-name">없음</span>
      </div>

      <div id="motion-row">
        <label id="motion-label">모션 파일 (.vrma)</label>
        <div id="motion-slots">
          <div class="motion-slot" data-slot="idle">
            <span class="slot-name">대기</span>
            <input type="file" class="motion-input" accept=".vrma" />
            <span class="slot-filename">없음</span>
          </div>
          <div class="motion-slot" data-slot="talking">
            <span class="slot-name">말하기</span>
            <input type="file" class="motion-input" accept=".vrma" />
            <span class="slot-filename">없음</span>
          </div>
          <div class="motion-slot" data-slot="happy">
            <span class="slot-name">기쁨</span>
            <input type="file" class="motion-input" accept=".vrma" />
            <span class="slot-filename">없음</span>
          </div>
          <div class="motion-slot" data-slot="surprised">
            <span class="slot-name">놀람</span>
            <input type="file" class="motion-input" accept=".vrma" />
            <span class="slot-filename">없음</span>
          </div>
          <div class="motion-slot" data-slot="shy">
            <span class="slot-name">수줍음</span>
            <input type="file" class="motion-input" accept=".vrma" />
            <span class="slot-filename">없음</span>
          </div>
        </div>
      </div>
    </div>

    <div id="footer">
      <span>Kurodo-VRM v0.1.0</span>
      <a href="https://github.com/your-repo/vrm-buddy" target="_blank">GitHub</a>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "./lib/three.module.js",
      "three/addons/": "./lib/addons/",
      "@pixiv/three-vrm": "./lib/three-vrm.module.js",
      "@pixiv/three-vrm-animation": "./lib/three-vrm-animation.module.js"
    }
  }
  </script>
  <script type="module" src="panel.js"></script>
</body>
</html>
